name: Auto-Update-WorldCup-ICS-2026
run-name: Update World Cup ICS at ${{ github.event.head_commit.timestamp }}

on:
  schedule:
    - cron: '15 * * * *'  # 每小时第15分钟运行（避开整点高峰，提高成功率）
  workflow_dispatch:  # 允许手动点击运行
  push:
    branches: [ main ]

jobs:
  update-ics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install dependencies
        run: pip install requests icalendar
        
      - name: Run update script
        run: python update_worldcup_ics_2026.py
        
      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add worldcup_2026_final.ics
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update ICS file" && git push)
